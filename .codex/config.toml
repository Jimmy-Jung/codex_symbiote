#:schema https://developers.openai.com/codex/config-schema.json

# Codex CLI configuration for this repository.
# Project-scoped settings are loaded only when the project is trusted.

project_doc_max_bytes = 65536

[features]
multi_agent = true

[agents.explorer]
description = "Read-only codebase explorer for evidence gathering before edits."
config_file = "agents/explorer.toml"

[agents.worker]
description = "Implementation-focused role for small, targeted code changes."
config_file = "agents/worker.toml"

[agents.reviewer]
description = "Code review expert focused on bugs, regressions, and missing tests."
config_file = "agents/reviewer.toml"

[agents.monitor]
description = "Long-running command/polling monitor role."
config_file = "agents/monitor.toml"

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]

[[skills.config]]
path = "skills/code-accuracy"
enabled = true

[[skills.config]]
path = "skills/documentation"
enabled = true

[[skills.config]]
path = "skills/planning"
enabled = true

[[skills.config]]
path = "skills/verify-loop"
enabled = true
